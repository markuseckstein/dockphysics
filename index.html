<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DockPhysics</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0a1628;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        font-family: monospace;
        color: #c8d8e8;
      }
      header {
        padding: 10px 20px;
        font-size: 14px;
        letter-spacing: 0.1em;
        color: #7aa7c8;
      }
      #canvas-container {
        position: relative;
      }
      canvas {
        display: block;
        border: 1px solid #1e3a5f;
      }
      #controls {
        padding: 10px 20px;
        display: flex;
        gap: 18px;
        align-items: center;
        flex-wrap: wrap;
        max-width: 900px;
      }
      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        align-items: flex-start;
      }
      .ctrl-group label {
        font-size: 10px;
        color: #7aa7c8;
        letter-spacing: 0.05em;
      }
      .ctrl-row { display: flex; gap: 8px; align-items: center; }
      button {
        background: #1e3a5f;
        color: #c8d8e8;
        border: 1px solid #3a6a9f;
        padding: 6px 14px;
        cursor: pointer;
        font-family: monospace;
        font-size: 13px;
        border-radius: 3px;
      }
      button:hover { background: #2a5a8f; }
      input[type="range"] { width: 130px; accent-color: #3a6a9f; }
      input[type="range"]:disabled { opacity: 0.4; }
      select {
        background: #1e3a5f;
        color: #c8d8e8;
        border: 1px solid #3a6a9f;
        padding: 5px 8px;
        font-family: monospace;
        font-size: 13px;
        border-radius: 3px;
      }
      .readout { font-size: 11px; color: #c8d8e8; min-width: 48px; }
      #info {
        font-size: 11px;
        color: #5a8ab0;
      }
    </style>
  </head>
  <body>
    <header>DockPhysics — bird's-eye view</header>
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
    <div id="controls">
      <div class="ctrl-group">
        <label>Throttle (↑/↓)</label>
        <div class="ctrl-row">
          <input id="throttle" type="range" min="-1" max="1" step="0.05" value="0" />
          <span id="throttle-val" class="readout">0%</span>
        </div>
      </div>
      <div class="ctrl-group">
        <label>Helm (←/→)</label>
        <div class="ctrl-row">
          <input id="helm" type="range" min="-1" max="1" step="0.05" value="0" />
          <button id="btn-centre">Centre</button>
        </div>
      </div>
      <div class="ctrl-group">
        <label>Rudder config</label>
        <select id="rudder-config">
          <option value="single">1 — centre rudder</option>
          <option value="twin">2 — outboard rudders</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Standstill steering authority</label>
        <div class="ctrl-row">
          <input id="standstill" type="range" min="0" max="1" step="0.05" value="0.3" />
          <span id="standstill-val" class="readout">0.30</span>
        </div>
      </div>
      <div class="ctrl-group">
        <label>Overlay</label>
        <div class="ctrl-row">
          <label style="color:#c8d8e8"><input id="toggle-drag" type="checkbox" /> hull drag</label>
        </div>
      </div>
      <div class="ctrl-group">
        <label>&nbsp;</label>
        <button id="btn-reset">Reset</button>
      </div>
      <span id="info">vel: — &nbsp; yawRate: —</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
